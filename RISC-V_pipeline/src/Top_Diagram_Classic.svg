<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="600" viewBox="0 0 1100 600">
  <defs>
    <!-- Basic Markers -->
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333" />
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1976d2" />
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#d32f2f" />
    </marker>
    
    <style>
      .reg { fill: #cfd8dc; stroke: #607d8b; stroke-width: 2; }
      .comp { fill: #f5f5f5; stroke: #424242; stroke-width: 2; }
      .mux { fill: #e0f2f1; stroke: #00897b; stroke-width: 2; }
      .alu { fill: #fff8e1; stroke: #ffb300; stroke-width: 2; }
      
      .wire { fill: none; stroke: #333; stroke-width: 1.5; marker-end: url(#arrow); }
      .wire-fwd { fill: none; stroke: #1976d2; stroke-width: 1.5; marker-end: url(#arrow-blue); }
      .wire-fb { fill: none; stroke: #d32f2f; stroke-width: 1.5; marker-end: url(#arrow-red); }
      .wire-plain { fill: none; stroke: #333; stroke-width: 1.5; }
      
      .lbl { font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; font-size: 11px; fill: #555; }
      .lbl-bold { font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #333; text-anchor: middle; }
      .stage-title { font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; font-size: 16px; font-weight: bold; fill: #757575; text-anchor: middle; }
      .hdr { font-size: 18px; fill: #212121; font-weight: bold; }
    </style>
  </defs>

  <text x="550" y="30" class="hdr" text-anchor="middle">Classic 5-Stage RV32I Pipeline (Detailed View)</text>

  <!-- Stage Titles -->
  <text x="110" y="65" class="stage-title">Instruction Fetch</text>
  <text x="310" y="65" class="stage-title">Instruction Decode</text>
  <text x="520" y="65" class="stage-title">Execute / Address</text>
  <text x="720" y="65" class="stage-title">Memory Access</text>
  <text x="900" y="65" class="stage-title">Write Back</text>
  
  <text x="110" y="85" class="stage-title">IF</text>
  <text x="310" y="85" class="stage-title">ID</text>
  <text x="520" y="85" class="stage-title">EX</text>
  <text x="720" y="85" class="stage-title">MEM</text>
  <text x="900" y="85" class="stage-title">WB</text>

  <!-- Pipeline vertical registers -->
  <rect x="210" y="100" width="15" height="420" class="reg"/>
  <text x="217" y="310" class="lbl-bold" transform="rotate(-90, 217, 310)">IF / ID</text>
  
  <rect x="410" y="100" width="15" height="420" class="reg"/>
  <text x="417" y="310" class="lbl-bold" transform="rotate(-90, 417, 310)">ID / EX</text>
  
  <rect x="630" y="100" width="15" height="420" class="reg"/>
  <text x="637" y="310" class="lbl-bold" transform="rotate(-90, 637, 310)">EX / MEM</text>
  
  <rect x="810" y="100" width="15" height="420" class="reg"/>
  <text x="817" y="310" class="lbl-bold" transform="rotate(-90, 817, 310)">MEM / WB</text>

  <!--=======================================
      IF STAGE 
      =======================================-->
  <polygon points="30,165 50,175 50,210 30,220" class="mux"/>
  <text x="40" y="195" class="lbl-bold" font-size="10">M</text>
  
  <rect x="70" y="170" width="20" height="45" class="comp"/>
  <text x="80" y="195" class="lbl-bold">PC</text>
  
  <rect x="120" y="200" width="60" height="90" class="comp"/>
  <text x="150" y="240" class="lbl-bold">Instruction</text>
  <text x="150" y="255" class="lbl-bold">Memory</text>
  
  <!-- Add 4 -->
  <path d="M 120 100 L 140 100 A 20 20 0 0 1 140 140 L 120 140 Z" class="alu"/>
  <text x="135" y="125" class="lbl-bold">Add</text>
  <text x="110" y="138" class="lbl">4</text>
  
  <!-- IF Wiring -->
  <path d="M 50 192 L 70 192" class="wire"/>
  <path d="M 90 192 L 120 192" class="wire"/> <!-- PC to IF/ID (actually wait, PC usually goes to IMEM, and IF/ID) -->
  <path d="M 100 192 L 100 245 L 120 245" class="wire"/> <!-- PC to MEM -->
  <path d="M 100 192 L 100 110 L 120 110" class="wire"/> <!-- PC to Add -->
  <path d="M 145 120 L 195 120 L 210 120" class="wire"/> <!-- PC+4 to IF/ID -->
  <path d="M 170 120 L 170 180 L 30 180" class="wire"/>   <!-- PC+4 back to PC Mux -->
  <path d="M 180 245 L 210 245" class="wire"/> <!-- Instr to IF/ID -->
  <path d="M 90 192 L 160 192 L 160 160 L 210 160" class="wire"/> <!-- Passed PC -->
  <circle cx="100" cy="192" r="3" fill="#333"/>
  <circle cx="170" cy="120" r="3" fill="#333"/>


  <!--=======================================
      ID STAGE 
      =======================================-->
  <rect x="260" y="210" width="70" height="130" class="comp"/>
  <text x="295" y="270" class="lbl-bold">Registers</text>
  <text x="270" y="235" class="lbl">rs1</text>
  <text x="270" y="265" class="lbl">rs2</text>
  <text x="270" y="325" class="lbl">wd</text>
  <text x="270" y="300" class="lbl">we</text>
  <text x="317" y="235" class="lbl">rd1</text>
  <text x="317" y="265" class="lbl">rd2</text>
  <!-- Write Addr 'rd' port -> 'wa' -->
  <text x="270" y="285" class="lbl">wa</text>

  <ellipse cx="295" cy="380" rx="35" ry="25" class="comp"/>
  <text x="295" y="375" class="lbl-bold">Sign</text>
  <text x="295" y="390" class="lbl-bold">Extend</text>

  <!-- ID Wiring -->
  <!-- Pass PC+4 & PC -->
  <path d="M 225 120 L 410 120" class="wire"/>
  <path d="M 225 160 L 410 160" class="wire"/>
  
  <!-- Instr Fanout -->
  <path d="M 225 245 L 245 245 L 245 230 L 260 230" class="wire"/> <!-- rs1 -->
  <path d="M 245 245 L 245 260 L 260 260" class="wire"/> <!-- rs2 -->
  <path d="M 245 245 L 245 380 L 260 380" class="wire"/> <!-- ImmGen -->
  <circle cx="245" cy="245" r="3" fill="#333"/>
  <circle cx="245" cy="260" r="3" fill="#333"/>
  
  <!-- Instr passed down for 'rd' bits -->
  <path d="M 225 245 L 235 245 L 235 440 L 410 440" class="wire"/>
  <circle cx="235" cy="245" r="3" fill="#333"/>
  <text x="320" y="435" class="lbl">rd[11:7]</text>

  <!-- Output Reg & Imm -->
  <path d="M 330 230 L 410 230" class="wire"/> <!-- RD1 -->
  <path d="M 330 260 L 410 260" class="wire"/> <!-- RD2 -->
  <path d="M 330 380 L 410 380" class="wire"/> <!-- Imm -->


  <!--=======================================
      EX STAGE 
      =======================================-->
  <!-- Branch Adder -->
  <path d="M 470 120 L 500 130 L 500 170 L 470 180 L 470 160 L 480 150 L 470 140 Z" class="alu"/>
  <text x="490" y="155" class="lbl-bold">Add</text>

  <!-- Forwarding Muxes & ALUSrc Mux -->
  <polygon points="450,210 470,220 470,260 450,270" class="mux"/>
  <text x="460" y="240" class="lbl" text-anchor="middle">FwdA</text>
  
  <polygon points="450,275 470,285 470,325 450,335" class="mux"/>
  <text x="460" y="305" class="lbl" text-anchor="middle">FwdB</text>
  
  <polygon points="490,290 510,300 510,340 490,350" class="mux"/>
  <text x="500" y="325" class="lbl" text-anchor="middle" font-size="9">ALUSrc</text>

  <!-- MAIN ALU -->
  <path d="M 530 230 L 570 250 L 570 320 L 530 340 L 530 295 L 540 285 L 530 275 Z" class="alu"/>
  <text x="555" y="290" class="lbl-bold">ALU</text>

  <!-- Comp / Branch Eval -->
  <rect x="530" y="180" width="30" height="30" class="comp" rx="15"/>
  <text x="545" y="199" class="lbl-bold" font-size="10">==</text>


  <!-- EX Wiring -->
  <path d="M 425 120 L 630 120" class="wire"/> <!-- PC+4 pass -->
  
  <path d="M 425 160 L 450 160 L 450 135 L 470 135" class="wire"/> <!-- PC to Branch Adder -->
  <path d="M 425 380 L 460 380 L 460 165 L 470 165" class="wire"/> <!-- Imm to Branch Adder -->
  <circle cx="460" cy="380" r="3" fill="#333"/>
  
  <!-- Branch Adder Out (Target) BACKWARD to IF -->
  <path d="M 500 150 L 515 150 L 515 40 L 25 40 L 25 210 L 30 210" class="wire-fb"/>
  <text x="250" y="35" class="lbl-bold" fill="#d32f2f">Branch Target</text>

  <!-- Mux A Inputs -->
  <path d="M 425 230 L 435 230 L 435 220 L 450 220" class="wire"/> <!-- From ID/EX RD1 -->
  <!-- Mid/Bot from FWD paths to be drawn later... -->
  <path d="M 470 240 L 500 240 L 500 250 L 530 250" class="wire"/> <!-- FwdA Out to ALU -->
  <path d="M 500 240 L 500 190 L 530 190" class="wire"/> <!-- FwdA Out to Branch == -->
  <circle cx="500" cy="240" r="3" fill="#333"/>

  <!-- Mux B Inputs -->
  <path d="M 425 260 L 435 260 L 435 285 L 450 285" class="wire"/> <!-- From ID/EX RD2 -->
  <!-- Fwd B out splits to AluSrc and StoreData -->
  <path d="M 470 305 L 480 305 L 480 305 L 490 305" class="wire"/>
  <path d="M 480 305 L 480 355 L 630 355" class="wire"/> <!-- Store Data flowing to EX/MEM -->
  <path d="M 480 305 L 480 205 L 530 205" class="wire"/> <!-- To Branch == -->
  <circle cx="480" cy="305" r="3" fill="#333"/>
  <text x="560" y="365" class="lbl">StoreData</text>

  <!-- ALUSrc Mux Inputs -->
  <path d="M 460 380 L 480 380 L 480 335 L 490 335" class="wire"/> <!-- Imm -->
  <path d="M 510 320 L 530 320" class="wire"/> <!-- ALUSrc out to ALU -->

  <!-- Branch == Output (wExPcRedirectEn) BACKWARD to IF -->
  <path d="M 560 195 L 570 195 L 570 50 L 35 50 L 35 165" class="wire-fb"/>
  <text x="250" y="60" class="lbl" fill="#d32f2f">Branch/Jump Taken (PC Redirect En)</text>

  <!-- ALU Output -->
  <path d="M 570 285 L 630 285" class="wire"/> <!-- To EX/MEM -->

  <!-- Rd pass -->
  <path d="M 425 440 L 630 440" class="wire"/>

  <!--=======================================
      MEM STAGE 
      =======================================-->
  <rect x="680" y="250" width="80" height="110" class="comp"/>
  <text x="720" y="300" class="lbl-bold">Data</text>
  <text x="720" y="315" class="lbl-bold">Memory</text>

  <!-- MEM Wiring -->
  <path d="M 645 120 L 810 120" class="wire"/> <!-- PC+4 Bypass -->
  
  <path d="M 645 285 L 680 285" class="wire"/> <!-- AluRes to Addr -->
  <path d="M 660 285 L 660 250 L 810 250" class="wire"/> <!-- AluRes Bypass out top of mem -->
  <circle cx="660" cy="285" r="3" fill="#333"/>
  <text x="730" y="245" class="lbl">AluResult Bypass</text>
  
  <path d="M 645 355 L 660 355 L 660 330 L 680 330" class="wire"/> <!-- Store Data -->

  <path d="M 760 305 L 810 305" class="wire"/> <!-- Mem Read Data -->

  <path d="M 645 440 L 810 440" class="wire"/> <!-- Passed Rd -->


  <!--=======================================
      WB STAGE & FEEDBACK 
      =======================================-->
  <polygon points="850,250 870,260 870,330 850,340" class="mux"/>
  <text x="860" y="295" class="lbl" text-anchor="middle">WB</text>

  <path d="M 825 250 L 835 250 L 835 270 L 850 270" class="wire"/> <!-- Alu Bypass to Mux -->
  <path d="M 825 305 L 835 305 L 835 320 L 850 320" class="wire"/> <!-- MemData to Mux -->
  <path d="M 825 120 L 845 120 L 845 295 L 850 295" class="wire"/> <!-- PC+4 to Mux -->
  
  <!-- WB WrData Feedback -->
  <path d="M 870 295 L 900 295 L 900 480 L 220 480 L 220 325 L 260 325" class="wire-fwd" stroke="#4a148c"/>
  <text x="500" y="475" class="lbl-bold" fill="#4a148c">reg_wd (Write Data Back)</text>
  
  <!-- WB Reg Write Enable (implied or separate wire) -->
  <path d="M 825 390 L 880 390 L 880 495 L 240 495 L 240 300 L 260 300" class="wire-fwd" stroke="#4a148c"/>
  <text x="215" y="490" class="lbl" fill="#4a148c">we</text>

  <!-- WB RdAddr passback -->
  <path d="M 825 440 L 890 440 L 890 510 L 230 510 L 230 280 L 260 280" class="wire-fwd" stroke="#4a148c"/>
  <text x="350" y="505" class="lbl-bold" fill="#4a148c">reg_wa (Write Address)</text>
  

  <!--=======================================
      INTERNAL FORWARDING PATHS (EX to EX, MEM to EX)
      =======================================-->
  <text x="630" y="423" class="lbl-bold" fill="#1976d2">Internal Forwarding</text>

  <!-- EX/MEM FWD -->
  <!-- Tapped right at AluResult in MEM stage. `x=650` -->
  <path d="M 650 285 L 650 430 L 435 430 L 435 240 L 450 240" class="wire-fwd"/> <!-- FwdA Mid -->
  <path d="M 435 430 L 435 305 L 450 305" class="wire-fwd"/> <!-- FwdB Mid -->
  <circle cx="435" cy="430" r="3" fill="#1976d2"/>

  <!-- MEM/WB FWD -->
  <!-- Tapped right at WBMux Output `880, 295` -->
  <!-- Path drops to `450`, goes horizontally. -->
  <path d="M 880 295 L 880 450 L 420 450 L 420 260 L 450 260" class="wire-fwd"/> <!-- FwdA Bot -->
  <path d="M 420 450 L 420 325 L 450 325" class="wire-fwd"/> <!-- FwdB Bot -->
  <circle cx="420" cy="450" r="3" fill="#1976d2"/>
  <circle cx="880" cy="295" r="3" fill="#1976d2"/>

</svg>

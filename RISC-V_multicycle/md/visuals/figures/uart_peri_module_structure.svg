<svg xmlns="http://www.w3.org/2000/svg" width="1680" height="980" viewBox="0 0 1680 980">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#111111"/>
    </marker>
    <style>
      .bg { fill: #ffffff; }
      .group { fill: none; stroke: #888888; stroke-width: 1.8; stroke-dasharray: 8 6; rx: 18; ry: 18; }
      .box { fill: #ffffff; stroke: #111111; stroke-width: 2.2; rx: 16; ry: 16; }
      .thin { fill: #ffffff; stroke: #111111; stroke-width: 1.8; rx: 12; ry: 12; }
      .ghost { fill: #fafafa; stroke: #666666; stroke-width: 1.8; stroke-dasharray: 8 6; rx: 14; ry: 14; }
      .title { fill: #111111; font-family: "Segoe UI", "Malgun Gothic", sans-serif; font-size: 34px; font-weight: 700; }
      .subtitle { fill: #333333; font-family: "Segoe UI", "Malgun Gothic", sans-serif; font-size: 18px; font-weight: 500; }
      .group-title { fill: #111111; font-family: "Segoe UI", "Malgun Gothic", sans-serif; font-size: 24px; font-weight: 700; }
      .name { fill: #111111; font-family: "Segoe UI", "Malgun Gothic", sans-serif; font-size: 24px; font-weight: 700; text-anchor: middle; }
      .meta { fill: #222222; font-family: "Segoe UI", "Malgun Gothic", sans-serif; font-size: 16px; font-weight: 500; text-anchor: middle; }
      .small { fill: #444444; font-family: "Segoe UI", "Malgun Gothic", sans-serif; font-size: 15px; font-weight: 500; text-anchor: middle; }
      .arrow { fill: none; stroke: #111111; stroke-width: 2.8; marker-end: url(#arrow); stroke-linecap: round; stroke-linejoin: round; }
      .dashed { fill: none; stroke: #555555; stroke-width: 2.2; stroke-dasharray: 8 6; marker-end: url(#arrow); stroke-linecap: round; stroke-linejoin: round; }
      .legend { fill: #111111; font-family: "Segoe UI", "Malgun Gothic", sans-serif; font-size: 16px; font-weight: 500; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1680" height="980"/>
  <text class="title" x="40" y="56">uart_peri Module Structure</text>
  <text class="subtitle" x="40" y="88">APB wrapper → UART core → UART line engine / FIFO blocks</text>

  <rect class="group" x="40" y="120" width="430" height="310"/>
  <text class="group-title" x="60" y="158">APB Layer</text>

  <rect class="box" x="80" y="190" width="350" height="180"/>
  <text class="name" x="255" y="235">uart_apb_wrapper</text>
  <text class="meta" x="255" y="272">APB register map / status / error / baudcfg</text>
  <text class="meta" x="255" y="302">ADDR_ID, STATUS, TXDATA, RXDATA, CONTROL, BAUDCFG</text>
  <text class="small" x="255" y="332">selects baud source: APB register or external i_baud_sel</text>

  <rect class="group" x="520" y="120" width="1120" height="790"/>
  <text class="group-title" x="540" y="158">UART Core Layer</text>

  <rect class="box" x="580" y="210" width="420" height="180"/>
  <text class="name" x="790" y="255">uart_core</text>
  <text class="meta" x="790" y="292">coordinates TX FIFO, RX FIFO, Top_uart</text>
  <text class="meta" x="790" y="322">sticky flags: overflow / frame_error</text>
  <text class="small" x="790" y="352">w_tx_start = !tx_empty &amp; !tx_busy</text>

  <rect class="group" x="1060" y="190" width="540" height="320"/>
  <text class="group-title" x="1080" y="228">Serial Engine</text>

  <rect class="box" x="1110" y="260" width="440" height="180"/>
  <text class="name" x="1330" y="305">Top_uart</text>
  <text class="meta" x="1330" y="342">serial TX/RX integration</text>
  <text class="meta" x="1330" y="372">shares one 16x baud tick between tx and rx</text>

  <rect class="thin" x="1080" y="570" width="300" height="120"/>
  <text class="name" x="1230" y="612">tx</text>
  <text class="meta" x="1230" y="642">start / data / stop FSM</text>
  <text class="small" x="1230" y="668">consumes 16x baud_tick</text>

  <rect class="thin" x="1410" y="570" width="300" height="120"/>
  <text class="name" x="1560" y="612">rx</text>
  <text class="meta" x="1560" y="642">start detect / data sample / stop check</text>
  <text class="small" x="1560" y="668">sets o_rx_done / o_frame_error</text>

  <rect class="thin" x="1245" y="740" width="300" height="120"/>
  <text class="name" x="1395" y="782">baud_tick_16</text>
  <text class="meta" x="1395" y="812">phase accumulator based tick generator</text>
  <text class="small" x="1395" y="838">i_baud_sel → 16x oversampling tick</text>

  <rect class="group" x="560" y="450" width="430" height="430"/>
  <text class="group-title" x="580" y="488">FIFO Subsystem</text>

  <rect class="box" x="610" y="530" width="330" height="130"/>
  <text class="name" x="775" y="572">Top_FIFO (TX)</text>
  <text class="meta" x="775" y="602">8-bit FIFO, depth = TX_FIFO_DEPTH</text>
  <text class="small" x="775" y="628">buffers APB writes before serial transmit</text>

  <rect class="box" x="610" y="700" width="330" height="130"/>
  <text class="name" x="775" y="742">Top_FIFO (RX)</text>
  <text class="meta" x="775" y="772">8-bit FIFO, depth = RX_FIFO_DEPTH</text>
  <text class="small" x="775" y="798">buffers received bytes for APB reads</text>

  <rect class="thin" x="250" y="520" width="210" height="96"/>
  <text class="name" x="355" y="560">TX status</text>
  <text class="meta" x="355" y="588">full / empty / busy</text>

  <rect class="thin" x="250" y="670" width="210" height="96"/>
  <text class="name" x="355" y="710">RX status</text>
  <text class="meta" x="355" y="738">full / empty / data</text>

  <rect class="thin" x="250" y="820" width="210" height="96"/>
  <text class="name" x="355" y="860">Sticky errors</text>
  <text class="meta" x="355" y="888">overflow / frame_error</text>

  <rect class="group" x="40" y="470" width="170" height="430"/>
  <text class="group-title" x="60" y="508">Internal FIFO Blocks</text>

  <rect class="thin" x="60" y="550" width="130" height="96"/>
  <text class="name" x="125" y="588" style="font-size:20px;">fifo_control</text>
  <text class="small" x="125" y="616">ptr / full / empty / we</text>

  <rect class="thin" x="60" y="690" width="130" height="96"/>
  <text class="name" x="125" y="728" style="font-size:20px;">fifo_register</text>
  <text class="small" x="125" y="756">LUTRAM data store</text>

  <rect class="ghost" x="1080" y="60" width="390" height="92"/>
  <text class="name" x="1275" y="98" style="font-size:22px;">fifo_uart_fsm</text>
  <text class="meta" x="1275" y="126">legacy helper module</text>
  <text class="small" x="1275" y="146">defined in uart_peri/fifo but not instantiated in current path</text>

  <path class="arrow" d="M 430 280 L 580 280"/>
  <path class="arrow" d="M 1000 300 L 1110 330"/>

  <path class="arrow" d="M 730 390 L 730 530"/>
  <path class="arrow" d="M 850 390 L 850 700"/>
  <path class="arrow" d="M 930 390 L 1230 390 L 1230 570"/>
  <path class="arrow" d="M 970 390 L 1560 390 L 1560 570"/>
  <path class="arrow" d="M 900 390 L 1395 390 L 1395 740"/>

  <path class="arrow" d="M 1230 440 L 1230 570"/>
  <path class="arrow" d="M 1430 440 L 1560 440 L 1560 570"/>
  <path class="arrow" d="M 1330 440 L 1395 440 L 1395 740"/>

  <path class="arrow" d="M 610 595 L 460 595"/>
  <path class="arrow" d="M 610 745 L 460 745"/>
  <path class="arrow" d="M 610 765 L 460 865"/>

  <path class="dashed" d="M 190 598 L 240 598"/>
  <path class="dashed" d="M 190 738 L 240 738"/>
  <path class="dashed" d="M 190 738 L 220 738 L 220 865 L 240 865"/>
  <path class="dashed" d="M 355 766 L 355 820"/>

  <rect class="thin" x="70" y="930" width="18" height="18"/>
  <text class="legend" x="100" y="945">solid arrow: instantiated / direct data-control dependency</text>
  <line class="dashed" x1="570" y1="940" x2="620" y2="940"/>
  <text class="legend" x="640" y="945">dashed arrow: internal implementation relationship / reference block</text>
</svg>

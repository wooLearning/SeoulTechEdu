<svg xmlns="http://www.w3.org/2000/svg" width="1050" height="500" viewBox="0 0 1050 500">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333" />
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#d32f2f" />
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1976d2" />
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f57c00" />
    </marker>
    
    <style>
      .box { stroke-width: 2; rx: 8; ry: 8; }
      .text-title { font-family: sans-serif; font-weight: bold; font-size: 16px; fill: #333; text-anchor: middle; }
      .text-label { font-family: sans-serif; font-size: 12px; fill: #555; }
      .path-default { stroke: #333; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .path-flush { stroke: #d32f2f; stroke-width: 2; stroke-dasharray: 4,4; fill: none; marker-end: url(#arrow-red); }
      .path-stall { stroke: #f57c00; stroke-width: 2; stroke-dasharray: 4,4; fill: none; marker-end: url(#arrow-orange); }
      .path-fwd { stroke: #1976d2; stroke-width: 2; stroke-dasharray: 4,4; fill: none; marker-end: url(#arrow-blue); }
    </style>
  </defs>

  <!-- Title -->
  <text x="525" y="30" font-family="sans-serif" font-size="24" font-weight="bold" fill="#333" text-anchor="middle">RV32I Pipeline Top Module</text>

  <!-- Top Module Boundary -->
  <rect x="25" y="50" width="1000" height="420" fill="none" stroke="#9e9e9e" stroke-width="2" stroke-dasharray="10,5" rx="10"/>
  <text x="40" y="70" class="text-label" fill="#9e9e9e">Top (Top.sv)</text>

  <!-- Global Inputs -->
  <text x="40" y="235" class="text-label">iClk, iRstn</text>
  <path d="M 25 240 L 70 240" class="path-default" marker-end=""/>
  
  <!-- Stages Boxes -->
  <!-- FetchStage -->
  <rect x="80" y="150" width="140" height="180" fill="#e3f2fd" stroke="#1e88e5" class="box" />
  <text x="150" y="175" class="text-title">FetchStage</text>
  <text x="150" y="195" class="text-label" text-anchor="middle">uFetchStage</text>
  <text x="150" y="240" class="text-label" text-anchor="middle" fill="#1e88e5">- Fetch PC</text>
  <text x="150" y="260" class="text-label" text-anchor="middle" fill="#1e88e5">- Read Instr</text>

  <!-- DecodeStage -->
  <rect x="280" y="150" width="140" height="180" fill="#e8f5e9" stroke="#43a047" class="box" />
  <text x="350" y="175" class="text-title">DecodeStage</text>
  <text x="350" y="195" class="text-label" text-anchor="middle">uDecodeStage</text>
  <text x="350" y="240" class="text-label" text-anchor="middle" fill="#43a047">- Decode Ctrl</text>
  <text x="350" y="260" class="text-label" text-anchor="middle" fill="#43a047">- RegFile Read</text>
  <text x="350" y="280" class="text-label" text-anchor="middle" fill="#43a047">- Hazard/Stall Base</text>
  
  <!-- ExecuteStage -->
  <rect x="480" y="150" width="140" height="180" fill="#fff3e0" stroke="#fb8c00" class="box" />
  <text x="550" y="175" class="text-title">ExecuteStage</text>
  <text x="550" y="195" class="text-label" text-anchor="middle">uExecuteStage</text>
  <text x="550" y="240" class="text-label" text-anchor="middle" fill="#fb8c00">- ALU / Branch</text>
  <text x="550" y="260" class="text-label" text-anchor="middle" fill="#fb8c00">- PC Redirect</text>
  <text x="550" y="280" class="text-label" text-anchor="middle" fill="#fb8c00">- Forwarding Logic</text>
  
  <!-- MemStage -->
  <rect x="680" y="150" width="140" height="180" fill="#f3e5f5" stroke="#8e24aa" class="box" />
  <text x="750" y="175" class="text-title">MemStage</text>
  <text x="750" y="195" class="text-label" text-anchor="middle">uMemStage</text>
  <text x="750" y="240" class="text-label" text-anchor="middle" fill="#8e24aa">- Data Memory</text>
  <text x="750" y="260" class="text-label" text-anchor="middle" fill="#8e24aa">  Read/Write</text>
  
  <!-- WbStage -->
  <rect x="880" y="150" width="120" height="180" fill="#e0f7fa" stroke="#00acc1" class="box" />
  <text x="940" y="175" class="text-title">WbStage</text>
  <text x="940" y="195" class="text-label" text-anchor="middle">uWbStage</text>
  <text x="940" y="240" class="text-label" text-anchor="middle" fill="#00acc1">- Select WbData</text>

  <!-- Connections Forward -->
  <!-- IF/ID -->
  <path d="M 220 240 L 280 240" class="path-default" />
  <text x="250" y="235" class="text-label" text-anchor="middle">rIfId*</text>

  <!-- ID/EX -->
  <path d="M 420 240 L 480 240" class="path-default" />
  <text x="450" y="235" class="text-label" text-anchor="middle">rIdEx*</text>

  <!-- EX/MEM -->
  <path d="M 620 240 L 680 240" class="path-default" />
  <text x="650" y="235" class="text-label" text-anchor="middle">rExMem*</text>

  <!-- MEM/WB -->
  <path d="M 820 240 L 880 240" class="path-default" />
  <text x="850" y="235" class="text-label" text-anchor="middle">rMemWb*</text>

  <!-- Backward Connections -->
  <!-- Writeback -->
  <path d="M 940 330 L 940 420 L 350 420 L 350 330" class="path-fwd" />
  <rect x="580" y="410" width="130" height="20" fill="white" />
  <text x="645" y="425" class="text-label" fill="#1976d2" text-anchor="middle">wMemWb2Regfile_*</text>

  <!-- PC Redirect (Flush / Jump / Branch) -->
  <path d="M 550 150 L 550 100 L 150 100 L 150 150" class="path-flush" />
  <path d="M 250 100 L 350 100 L 350 150" class="path-flush" />
  <rect x="290" y="90" width="130" height="20" fill="white" />
  <text x="355" y="105" fill="#d32f2f" font-size="12" font-family="sans-serif" text-anchor="middle">wExPcRedirect*</text>

  <!-- Stall -->
  <path d="M 350 150 L 350 120 L 150 120 L 150 150" class="path-stall" />
  <rect x="200" y="110" width="120" height="20" fill="white" />
  <text x="260" y="125" fill="#f57c00" font-size="12" font-family="sans-serif" text-anchor="middle">wHazard2Top_*</text>
  
  <!-- Forwarding Ex/Mem & Mem/Wb to Execute -->
  <!-- Note: Forward logic receives states directly from registers, routed back into ExecuteStage -->
  <path d="M 850 240 L 850 380 L 580 380 L 580 330" class="path-fwd" />
  <rect x="680" y="370" width="90" height="20" fill="white" />
  <text x="725" y="385" fill="#1976d2" font-size="12" font-family="sans-serif" text-anchor="middle">rMemWb* (Fwd)</text>

  <rect x="630" y="350" width="90" height="20" fill="white" />
  <text x="675" y="365" fill="#1976d2" font-size="12" font-family="sans-serif" text-anchor="middle">rExMem* (Fwd)</text>
  <path d="M 650 240 L 650 360 L 520 360 L 520 330" class="path-fwd" />
  
  <!-- Outputs (oDbg*) -->
  <path d="M 1000 240 L 1025 240" class="path-default" />
  <text x="1010" y="235" class="text-label" text-anchor="end">oDbg*</text>

</svg>

    - generic [ref=e177]:
      - article [ref=e178]:
        - paragraph [ref=e179]: Chart Guide
        - heading "1. Verification Dashboard" [level=3] [ref=e180]
        - paragraph [ref=e181]: 4개 핵심 그래프를 한 화면에 모아 둔 요약 화면입니다.
      - article [ref=e182]:
        - paragraph [ref=e183]: Chart Guide
        - heading "2. Module Transfer Overview" [level=3] [ref=e184]
        - paragraph [ref=e185]: x축은 모듈, y축은 횟수입니다. WR/RD accepted와 WR/RD blocked를 함께 표시합니다.
      - article [ref=e186]:
        - paragraph [ref=e187]: Chart Guide
        - heading "3. Scenario Activity Heatmap" [level=3] [ref=e188]
        - paragraph [ref=e189]: x축은 시나리오, y축은 모듈이며 각 셀의 색과 숫자는 accepted activity 양입니다. 어떤 시나리오가 실제로 활발히 수행되었는지 한눈에 보이게 하려는 의도입니다.
      - article [ref=e190]:
        - paragraph [ref=e191]: Chart Guide
        - heading "4. Reference Model Depth Trend" [level=3] [ref=e192]
        - paragraph [ref=e193]: x축은 sample index, y축은 transaction 이후의 reference model depth입니다. FIFO가 fill, mixed, drain 흐름을 따라 실제로 차고 비는지를 시간 순서로 보여주기 위해 넣었습니다.
      - article [ref=e194]:
        - paragraph [ref=e195]: Chart Guide
        - heading "5. Depth Histogram" [level=3] [ref=e196]
        - paragraph [ref=e197]: x축은 depth 값, y축은 해당 depth가 등장한 빈도입니다. 테스트가 특정 구간에만 몰리지 않고 empty/full 근처 경계 상태까지 얼마나 넓게 밟았는지 설명하기 위한 분포 그래프입니다.
  - generic [ref=e198]:
    - heading "Coverage 설정 설명 및 근거" [level=2] [ref=e199]
    - generic [ref=e200]:
      - article [ref=e201]:
        - paragraph [ref=e202]: Coverage Plan
        - heading "Scenario Coverage" [level=3] [ref=e203]
        - paragraph [ref=e204]: generator가 설계한 phase-aware 시나리오가 실제로 모두 실행됐는지 보는 항목입니다. 단순 랜덤 분포가 아니라 fill, mixed, drain, pressure 구간이 모두 존재해야 한다는 설계 의도를 담고 있습니다.
      - article [ref=e205]:
        - paragraph [ref=e206]: Coverage Plan
        - heading "Path Coverage" [level=3] [ref=e207]
        - paragraph [ref=e208]: "`wr_acc`, `rd_acc`와 함께 `wr_block`, `rd_block`를 반드시 남기도록 한 이유는 정상 경로만 아니라 full/empty 보호 경로까지 검증 근거로 남기기 위해서입니다."
      - article [ref=e209]:
        - paragraph [ref=e210]: Coverage Plan
        - heading "Flag and Cross Coverage" [level=3] [ref=e211]
        - paragraph [ref=e212]: "`full`, `empty`, `normal` 상태와 scenario/request mix/domain을 교차해 특정 시나리오가 실제로 어떤 경계 상태를 만들었는지 연결합니다."
      - article [ref=e213]:
        - paragraph [ref=e214]: Coverage Plan
        - heading "Why CSV Again" [level=3] [ref=e215]
        - paragraph [ref=e216]: XSim의 coverage 퍼센트 하나만으로는 의도가 잘 전달되지 않아, scoreboard가 직접 만든 summary/scenario/trace CSV를 Python에서 다시 읽어 coverage 해석 근거를 보강했습니다.
  - generic [ref=e217]:
    - heading "시나리오 상세 설명" [level=2] [ref=e218]
    - generic [ref=e219]:
      - article [ref=e220]:
        - paragraph [ref=e221]: Scenario Guide
        - heading "fill_burst" [level=3] [ref=e222]
        - paragraph [ref=e223]:
          - strong [ref=e224]: "목적:"
          - text: queue depth를 빠르게 끌어올려 full 근처 동작과 write blocked path를 의도적으로 만든 시나리오입니다.
        - paragraph [ref=e225]:
          - strong [ref=e226]: "커버리지 해석:"
          - text: WR Acc가 충분히 나오면서 WR Block이 함께 관측되면 fill/full pressure가 실제로 검증된 것입니다.
      - article [ref=e227]:
        - paragraph [ref=e228]: Scenario Guide
        - heading "mixed_stress" [level=3] [ref=e229]
        - paragraph [ref=e230]:
          - strong [ref=e231]: "목적:"
          - text: read/write를 섞어 일반 운용 구간에서 ordering과 accepted path를 동시에 검증하는 시나리오입니다.
        - paragraph [ref=e232]:
          - strong [ref=e233]: "커버리지 해석:"
          - text: WR Acc와 RD Acc가 함께 높게 나타나면 scoreboard ordering 검증이 활발히 수행된 것으로 해석합니다.
      - article [ref=e234]:
        - paragraph [ref=e235]: Scenario Guide
        - heading "drain_burst" [level=3] [ref=e236]
        - paragraph [ref=e237]:
          - strong [ref=e238]: "목적:"
          - text: queue를 비우는 방향으로 bias를 줘 empty 근처 동작과 read blocked path를 유도하는 시나리오입니다.
        - paragraph [ref=e239]:
          - strong [ref=e240]: "커버리지 해석:"
          - text: RD Acc와 RD Block이 함께 나타나면 drain과 underflow protection이 모두 검증된 것입니다.
      - article [ref=e241]:
        - paragraph [ref=e242]: Scenario Guide
        - heading "full_pressure" [level=3] [ref=e243]
        - paragraph [ref=e244]:
          - strong [ref=e245]: "목적:"
          - text: 깊이가 높은 상태에서 write를 지속적으로 인가해 backpressure와 full flag 일관성을 보는 시나리오입니다.
        - paragraph [ref=e246]:
          - strong [ref=e247]: "커버리지 해석:"
          - text: WR Block이 의미 있게 잡히면 DUT가 full 보호를 수행했고 monitor/scoreboard가 이를 포착한 것입니다.
      - article [ref=e248]:
        - paragraph [ref=e249]: Scenario Guide
        - heading "empty_pressure" [level=3] [ref=e250]
        - paragraph [ref=e251]:
          - strong [ref=e252]: "목적:"
          - text: 비어 있는 상태에서 read를 반복해 underflow protection과 empty flag 일관성을 확인하는 시나리오입니다.
        - paragraph [ref=e253]:
          - strong [ref=e254]: "커버리지 해석:"
          - text: RD Block이 의미 있게 나타나면 empty 보호 경로가 실제로 수행된 것입니다.
      - article [ref=e255]:
        - paragraph [ref=e256]: Scenario Guide
        - heading "simul_stress" [level=3] [ref=e257]
        - paragraph [ref=e258]:
          - strong [ref=e259]: "목적:"
          - text: sync FIFO에서 same-cycle read/write 정책을 강하게 두드리는 시나리오입니다.
        - paragraph [ref=e260]:
          - strong [ref=e261]: "커버리지 해석:"
          - text: WR Acc와 RD Acc가 같은 구간에서 동시에 높으면 동시 처리 정책 검증이 충분히 일어났다고 볼 수 있습니다.
      - article [ref=e262]:
        - paragraph [ref=e263]: Scenario Guide
        - heading "flag_pressure" [level=3] [ref=e264]
        - paragraph [ref=e265]:
          - strong [ref=e266]: "목적:"
          - text: sync FIFO의 full/empty 근처를 반복적으로 두드려 flag 경계 조건과 blocked path를 강조하는 시나리오입니다.
        - paragraph [ref=e267]:
          - strong [ref=e268]: "커버리지 해석:"
          - text: WR Block 또는 RD Block이 함께 보이면 boundary pressure가 실제로 먹혔다는 의미입니다.
      - article [ref=e269]:
        - paragraph [ref=e270]: Scenario Guide
        - heading "balanced_stream" [level=3] [ref=e271]
        - paragraph [ref=e272]:
          - strong [ref=e273]: "목적:"
          - text: 한쪽으로 치우치지 않은 steady-state traffic에서 sustained throughput과 flag 안정성을 보는 시나리오입니다.
        - paragraph [ref=e274]:
          - strong [ref=e275]: "커버리지 해석:"
          - text: WR Acc와 RD Acc가 균형 있게 유지되면 steady-state stream 검증 근거로 활용할 수 있습니다.

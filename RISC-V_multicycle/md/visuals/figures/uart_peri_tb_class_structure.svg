<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1180" viewBox="0 0 1800 1180">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#111111"/>
    </marker>
    <style>
      .bg { fill: #ffffff; }
      .group { fill: none; stroke: #777777; stroke-width: 1.8; stroke-dasharray: 9 6; rx: 18; ry: 18; }
      .box { fill: #ffffff; stroke: #111111; stroke-width: 2.2; rx: 16; ry: 16; }
      .soft { fill: #fcfcfc; stroke: #111111; stroke-width: 1.9; rx: 14; ry: 14; }
      .title { fill: #111111; font-family: "Segoe UI", "Malgun Gothic", sans-serif; font-size: 34px; font-weight: 700; }
      .group-title { fill: #111111; font-family: "Segoe UI", "Malgun Gothic", sans-serif; font-size: 24px; font-weight: 700; }
      .name { fill: #111111; font-family: "Segoe UI", "Malgun Gothic", sans-serif; font-size: 24px; font-weight: 700; text-anchor: middle; }
      .meta { fill: #222222; font-family: "Segoe UI", "Malgun Gothic", sans-serif; font-size: 16px; font-weight: 500; text-anchor: middle; }
      .small { fill: #444444; font-family: "Segoe UI", "Malgun Gothic", sans-serif; font-size: 15px; font-weight: 500; text-anchor: middle; }
      .legend { fill: #111111; font-family: "Segoe UI", "Malgun Gothic", sans-serif; font-size: 16px; font-weight: 500; }
      .solid { fill: none; stroke: #111111; stroke-width: 2.7; marker-end: url(#arrow); stroke-linecap: round; stroke-linejoin: round; }
      .dashed { fill: none; stroke: #444444; stroke-width: 2.3; stroke-dasharray: 9 6; marker-end: url(#arrow); stroke-linecap: round; stroke-linejoin: round; }
      .thin { fill: none; stroke: #111111; stroke-width: 2.1; marker-end: url(#arrow); stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1800" height="1180"/>
  <text class="title" x="40" y="58">uart_peri_tb Class / Interface Relationship</text>

  <rect class="group" x="40" y="100" width="1720" height="190"/>
  <text class="group-title" x="60" y="138">Compilation / Top-Level</text>

  <rect class="box" x="80" y="170" width="280" height="90"/>
  <text class="name" x="220" y="208">uart_peri_tb_pkg</text>
  <text class="meta" x="220" y="236">includes defs, objs, components, env, tests</text>

  <rect class="box" x="470" y="170" width="300" height="90"/>
  <text class="name" x="620" y="208">tb_uart_apb_wrapper</text>
  <text class="meta" x="620" y="236">top module</text>

  <rect class="box" x="880" y="170" width="270" height="90"/>
  <text class="name" x="1015" y="208">uart_peri_if</text>
  <text class="meta" x="1015" y="236">interface + drv_cb / mon_cb + UART tasks</text>

  <rect class="soft" x="1260" y="170" width="240" height="90"/>
  <text class="name" x="1380" y="208">uart_apb_wrapper</text>
  <text class="meta" x="1380" y="236">DUT</text>

  <rect class="soft" x="1560" y="170" width="160" height="90"/>
  <text class="name" x="1640" y="208">tb_defs.svh</text>
  <text class="meta" x="1640" y="236">enum + macros</text>

  <rect class="group" x="40" y="330" width="540" height="760"/>
  <text class="group-title" x="60" y="368">Objects / Base Types</text>

  <rect class="box" x="90" y="420" width="220" height="120"/>
  <text class="name" x="200" y="462">UartPeriConfig</text>
  <text class="meta" x="200" y="492">baud_sel / baud_rate</text>
  <text class="meta" x="200" y="520">bit_period_ns / jitter_ns / timeout</text>

  <rect class="box" x="90" y="620" width="220" height="120"/>
  <text class="name" x="200" y="662">UartPeriTransaction</text>
  <text class="meta" x="200" y="692">kind / data / stop_ok / note</text>
  <text class="small" x="200" y="718">sprint()</text>

  <rect class="soft" x="90" y="820" width="220" height="120"/>
  <text class="name" x="200" y="862">uart_peri_event_kind_e</text>
  <text class="meta" x="200" y="892">UART_PERI_EVT_TX_BYTE</text>

  <rect class="box" x="340" y="620" width="190" height="120"/>
  <text class="name" x="435" y="662">mailbox</text>
  <text class="meta" x="435" y="692">mailbox #(UartPeriTransaction)</text>
  <text class="small" x="435" y="718">mbx_mon2scb</text>

  <rect class="group" x="620" y="330" width="1140" height="760"/>
  <text class="group-title" x="640" y="368">Class-Based Testbench</text>

  <rect class="box" x="690" y="420" width="320" height="130"/>
  <text class="name" x="850" y="462">UartPeriBaseTest</text>
  <text class="meta" x="850" y="492">owns m_cfg, m_env</text>
  <text class="meta" x="850" y="520">run() creates env and starts flow</text>

  <rect class="box" x="1070" y="420" width="330" height="130"/>
  <text class="name" x="1235" y="462">UartPeriDirectedTest</text>
  <text class="meta" x="1235" y="492">extends BaseTest</text>
  <text class="meta" x="1235" y="520">reset / tx / rx / jitter / baud / error checks</text>

  <rect class="box" x="820" y="650" width="360" height="150"/>
  <text class="name" x="1000" y="692">UartPeriEnv</text>
  <text class="meta" x="1000" y="722">owns m_driver, m_monitor, m_scoreboard</text>
  <text class="meta" x="1000" y="750">creates shared mailbox in new()</text>
  <text class="small" x="1000" y="776">run() forks driver / monitor / scoreboard</text>

  <rect class="box" x="640" y="900" width="280" height="130"/>
  <text class="name" x="780" y="942">UartPeriDriver</text>
  <text class="meta" x="780" y="972">APB read/write helpers</text>
  <text class="meta" x="780" y="1000">UART RX frame injection helpers</text>

  <rect class="box" x="960" y="900" width="280" height="130"/>
  <text class="name" x="1100" y="942">UartPeriMonitor</text>
  <text class="meta" x="1100" y="972">captures serial TX frame</text>
  <text class="meta" x="1100" y="1000">puts Transaction into mailbox</text>

  <rect class="box" x="1280" y="900" width="320" height="130"/>
  <text class="name" x="1440" y="942">UartPeriScoreboard</text>
  <text class="meta" x="1440" y="972">expected_tx_q + match / mismatch</text>
  <text class="meta" x="1440" y="1000">gets Transaction from mailbox and compares</text>

  <path class="solid" d="M 360 215 L 470 215"/>
  <path class="solid" d="M 770 215 L 880 215"/>
  <path class="solid" d="M 1150 215 L 1260 215"/>
  <path class="dashed" d="M 1540 215 L 1500 215"/>
  <path class="dashed" d="M 1580 215 L 360 215"/>

  <path class="solid" d="M 620 260 L 620 330 L 1235 330 L 1235 420"/>
  <path class="dashed" d="M 1015 260 L 1015 350 L 850 350 L 850 420"/>
  <path class="dashed" d="M 1015 260 L 1015 350 L 1000 350 L 1000 650"/>
  <path class="dashed" d="M 1015 260 L 1015 350 L 780 350 L 780 900"/>
  <path class="dashed" d="M 1015 260 L 1015 350 L 1100 350 L 1100 900"/>
  <path class="dashed" d="M 1015 260 L 1015 350 L 1440 350 L 1440 900"/>

  <path class="solid" d="M 1010 485 L 1070 485"/>
  <path class="solid" d="M 850 550 L 850 610 L 1000 610 L 1000 650"/>

  <path class="solid" d="M 950 540 L 250 540 L 250 420"/>
  <path class="solid" d="M 900 760 L 280 760 L 280 620"/>

  <path class="solid" d="M 1000 800 L 1000 860 L 780 860 L 780 900"/>
  <path class="solid" d="M 1000 800 L 1000 860 L 1100 860 L 1100 900"/>
  <path class="solid" d="M 1000 800 L 1000 860 L 1440 860 L 1440 900"/>

  <path class="solid" d="M 530 680 L 820 680"/>
  <path class="solid" d="M 435 740 L 435 810 L 1440 810 L 1440 900"/>
  <path class="solid" d="M 1100 900 L 1100 840 L 435 840 L 435 740"/>

  <path class="solid" d="M 200 740 L 340 680"/>
  <path class="dashed" d="M 200 820 L 200 740"/>

  <rect class="soft" x="1460" y="420" width="240" height="130"/>
  <text class="name" x="1580" y="462">Runtime flow</text>
  <text class="meta" x="1580" y="492">tb_test = new(uIf)</text>
  <text class="meta" x="1580" y="520">tb_test.run()</text>

  <path class="solid" d="M 1400 485 L 1460 485"/>

  <rect class="soft" x="1460" y="650" width="240" height="150"/>
  <text class="name" x="1580" y="692">Shared resource</text>
  <text class="meta" x="1580" y="722">all major classes use</text>
  <text class="meta" x="1580" y="750">virtual uart_peri_if</text>
  <text class="small" x="1580" y="776">APB + UART tasks live here</text>

  <path class="dashed" d="M 1580 650 L 1580 590"/>

  <rect class="soft" x="80" y="1110" width="18" height="18"/>
  <text class="legend" x="110" y="1125">solid arrow: creates / owns / passes object</text>
  <line class="dashed" x1="650" y1="1120" x2="710" y2="1120"/>
  <text class="legend" x="730" y="1125">dashed arrow: dependency / shared interface / include-like relation</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="900" height="1800" viewBox="0 0 900 1800">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .line { stroke: #7a7a7a; stroke-width: 3; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .box { fill: #ffffff; stroke: #7a7a7a; stroke-width: 3; }
      .text { font: 26px "Noto Sans KR", Arial, sans-serif; fill: #4a4a4a; text-anchor: middle; dominant-baseline: middle; }
      .small { font: 20px "Noto Sans KR", Arial, sans-serif; fill: #6a6a6a; text-anchor: middle; dominant-baseline: middle; }
      .label { font: 18px "Noto Sans KR", Arial, sans-serif; fill: #6a6a6a; text-anchor: middle; dominant-baseline: middle; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#7a7a7a"/>
    </marker>
  </defs>

  <rect width="900" height="1800" class="bg"/>

  <circle cx="450" cy="70" r="26" class="box"/>

  <rect x="310" y="130" width="280" height="74" rx="16" ry="16" class="box"/>
  <text x="450" y="167" class="text">main 시작</text>

  <path d="M450 96 L450 130" class="line" marker-end="url(#arrow)"/>

  <rect x="250" y="250" width="400" height="86" rx="16" ry="16" class="box"/>
  <text x="450" y="285" class="text">상태 변수 초기화</text>
  <text x="450" y="315" class="small">blink, run_state, last_switches, last_baudcfg</text>

  <path d="M450 204 L450 250" class="line" marker-end="url(#arrow)"/>

  <rect x="180" y="380" width="540" height="108" rx="16" ry="16" class="box"/>
  <text x="450" y="420" class="text">MMIO 초기 설정</text>
  <text x="450" y="452" class="small">GPO / GPI / GPIO / UART / FND 초기값 write</text>

  <path d="M450 336 L450 380" class="line" marker-end="url(#arrow)"/>

  <rect x="250" y="530" width="400" height="78" rx="16" ry="16" class="box"/>
  <text x="450" y="569" class="text">부팅 메시지 UART 출력</text>

  <path d="M450 488 L450 530" class="line" marker-end="url(#arrow)"/>

  <rect x="250" y="650" width="400" height="78" rx="16" ry="16" class="box"/>
  <text x="450" y="689" class="text">report_mmio_snapshot()</text>

  <path d="M450 608 L450 650" class="line" marker-end="url(#arrow)"/>

  <rect x="320" y="770" width="260" height="74" rx="16" ry="16" class="box"/>
  <text x="450" y="807" class="text">무한 루프 진입</text>

  <path d="M450 728 L450 770" class="line" marker-end="url(#arrow)"/>

  <rect x="175" y="890" width="550" height="108" rx="16" ry="16" class="box"/>
  <text x="450" y="930" class="text">입력 읽기 및 요청 해석</text>
  <text x="450" y="962" class="small">GPI_IDATA read, baud/source/run/gpio_pattern 계산</text>

  <path d="M450 844 L450 890" class="line" marker-end="url(#arrow)"/>

  <rect x="255" y="1040" width="390" height="78" rx="16" ry="16" class="box"/>
  <text x="450" y="1079" class="text">UART 에러 상태 정리</text>

  <path d="M450 998 L450 1040" class="line" marker-end="url(#arrow)"/>

  <polygon points="450,1160 560,1240 450,1320 340,1240" class="box"/>
  <text x="450" y="1226" class="text">baud 요청</text>
  <text x="450" y="1260" class="small">변화 여부</text>

  <path d="M450 1118 L450 1160" class="line" marker-end="url(#arrow)"/>

  <rect x="585" y="1201" width="210" height="78" rx="16" ry="16" class="box"/>
  <text x="690" y="1231" class="text">baud 설정</text>
  <text x="690" y="1261" class="small">CFG log + UART_BAUDCFG write</text>

  <path d="M560 1240 L585 1240" class="line" marker-end="url(#arrow)"/>
  <text x="592" y="1216" class="label">Yes</text>

  <path d="M690 1279 L690 1362 L450 1362 L450 1400" class="line" marker-end="url(#arrow)"/>
  <text x="672" y="1342" class="label">merge</text>

  <path d="M450 1320 L450 1400" class="line" marker-end="url(#arrow)"/>
  <text x="470" y="1360" class="label">No</text>

  <polygon points="450,1400 560,1480 450,1560 340,1480" class="box"/>
  <text x="450" y="1468" class="text">FND run</text>
  <text x="450" y="1500" class="small">변화 여부</text>

  <rect x="585" y="1441" width="190" height="78" rx="16" ry="16" class="box"/>
  <text x="680" y="1480" class="text">fnd_set_run()</text>

  <path d="M560 1480 L585 1480" class="line" marker-end="url(#arrow)"/>
  <text x="592" y="1456" class="label">Yes</text>

  <path d="M680 1519 L680 1608 L450 1608 L450 1646" class="line" marker-end="url(#arrow)"/>
  <path d="M450 1560 L450 1646" class="line" marker-end="url(#arrow)"/>
  <text x="470" y="1600" class="label">No</text>

  <rect x="135" y="1646" width="630" height="102" rx="16" ry="16" class="box"/>
  <text x="450" y="1680" class="text">출력 및 로그 처리</text>
  <text x="450" y="1712" class="small">GPO_ODATA / GPIO_ODATA update, baud log, RX echo, heartbeat, delay, blink++</text>

  <path d="M135 1697 L70 1697 L70 807 L320 807" class="line" marker-end="url(#arrow)"/>

  <rect x="120" y="1762" width="660" height="18" class="box"/>
</svg>

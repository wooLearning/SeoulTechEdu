<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="760" viewBox="0 0 1100 760">
  <defs>
    <style>
      .title { font: 700 22px Arial, sans-serif; fill: #111; }
      .label { font: 400 18px Arial, sans-serif; fill: #111; }
      .small { font: 400 14px Arial, sans-serif; fill: #111; }
      .box { fill: #fff; stroke: #111; stroke-width: 3; }
      .dash { fill: none; stroke: #111; stroke-width: 3; stroke-dasharray: 12 10; }
      .line { fill: none; stroke: #111; stroke-width: 3; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#111"/>
    </marker>
  </defs>

  <rect x="20" y="40" width="240" height="300" class="dash"/>
  <text x="28" y="24" class="title">CPU</text>
  <rect x="38" y="58" width="214" height="105" class="box"/>
  <rect x="38" y="177" width="214" height="145" class="box"/>
  <text x="145" y="118" text-anchor="middle" class="label">Control Unit</text>
  <text x="145" y="238" text-anchor="middle" class="label">Datapath</text>

  <rect x="365" y="95" width="205" height="185" class="box"/>
  <text x="467" y="190" text-anchor="middle" class="label">Memory Controller</text>

  <path d="M 260 185 L 365 185" class="line" marker-start="url(#arrow)" marker-end="url(#arrow)"/>

  <rect x="705" y="70" width="210" height="180" class="dash"/>
  <text x="694" y="50" class="title">Memory</text>
  <rect x="725" y="88" width="170" height="65" class="box"/>
  <rect x="725" y="170" width="170" height="65" class="box"/>
  <text x="810" y="124" text-anchor="middle" class="label">Data Memory</text>
  <text x="810" y="148" text-anchor="middle" class="label">(RAM)</text>
  <text x="810" y="197" text-anchor="middle" class="label">Instruction</text>
  <text x="810" y="221" text-anchor="middle" class="label">Memory</text>
  <text x="810" y="245" text-anchor="middle" class="label">(ROM)</text>

  <path d="M 570 185 L 705 185" class="line" marker-start="url(#arrow)" marker-end="url(#arrow)"/>

  <path d="M 570 200 L 635 200 L 635 350" class="line" marker-end="url(#arrow)"/>
  <rect x="565" y="350" width="135" height="120" class="box"/>
  <text x="632" y="412" text-anchor="middle" class="label">APB</text>
  <text x="632" y="438" text-anchor="middle" class="label">Master</text>

  <path d="M 632 470 L 632 555" class="line"/>
  <path d="M 220 555 L 1010 555" class="line"/>

  <path d="M 255 555 L 255 615" class="line" marker-end="url(#arrow)"/>
  <path d="M 415 555 L 415 615" class="line" marker-end="url(#arrow)"/>
  <path d="M 632 555 L 632 615" class="line" marker-end="url(#arrow)"/>
  <path d="M 830 555 L 830 615" class="line" marker-end="url(#arrow)"/>
  <path d="M 1010 555 L 1010 615" class="line" marker-end="url(#arrow)"/>

  <circle cx="255" cy="660" r="68" class="box"/>
  <circle cx="415" cy="660" r="68" class="box"/>
  <circle cx="632" cy="660" r="68" class="box"/>
  <circle cx="830" cy="660" r="68" class="box"/>
  <circle cx="1010" cy="660" r="68" class="box"/>

  <text x="255" y="650" text-anchor="middle" class="label">Peripheral</text>
  <text x="255" y="676" text-anchor="middle" class="label">(GPO)</text>

  <text x="415" y="650" text-anchor="middle" class="label">Peripheral</text>
  <text x="415" y="676" text-anchor="middle" class="label">(GPI)</text>

  <text x="632" y="650" text-anchor="middle" class="label">Peripheral</text>
  <text x="632" y="676" text-anchor="middle" class="label">(GPIO)</text>

  <text x="830" y="650" text-anchor="middle" class="label">Peripheral</text>
  <text x="830" y="676" text-anchor="middle" class="label">(FND)</text>

  <text x="1010" y="650" text-anchor="middle" class="label">Peripheral</text>
  <text x="1010" y="676" text-anchor="middle" class="label">(UART)</text>
</svg>
